# TYPE    DATABASE  USER  ADDRESS        METHOD
# local socket — trust (no network exposure)
local     all       all                  trust
# loopback — no SSL required
host      all       all   127.0.0.1/32   scram-sha-256
host      all       all   ::1/128        scram-sha-256
# ALL external connections MUST use SSL — rejects plaintext from any remote IP
hostssl   all       all   0.0.0.0/0      scram-sha-256
