# =============================================================================
# Connection
# =============================================================================
listen_addresses            = '*'
max_connections             = 20
port                        = 5432

# =============================================================================
# WAL + Archiving  (WAL-G → Cloudflare R2)
# =============================================================================
wal_level                   = replica
archive_mode                = on
archive_command             = '/usr/local/bin/wal-push-wrapper.sh %p'
archive_timeout             = 60        # flush WAL to R2 at least every 60s
max_wal_size                = 2GB
min_wal_size                = 256MB
checkpoint_completion_target = 0.9

# =============================================================================
# SSL  (cert injected from PG_TLS_CERT / PG_TLS_KEY env vars by entrypoint.sh)
# =============================================================================
ssl                         = on
ssl_cert_file               = '/var/lib/postgresql/ssl/server.crt'
ssl_key_file                = '/var/lib/postgresql/ssl/server.key'
ssl_min_protocol_version    = 'TLSv1.2'

# =============================================================================
# Logging
# =============================================================================
log_timezone                = 'UTC'
timezone                    = 'UTC'
log_min_duration_statement  = 1000      # log queries slower than 1s
log_checkpoints             = on
log_lock_waits              = on

# =============================================================================
# Memory tuning
# Auto-set at first start by initdb.d/00-autoconf.sh (25% / 75% of actual RAM).
# Works on any size from 512Mi upward.
# Override without rebuild: ALTER SYSTEM SET shared_buffers = 'XGB';
# =============================================================================
